<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>頑シミュ MH4G</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f0f0f0; --panel: #e8e8e8; --border: #999;
  --btn: #d0d0d0; --btn-active: #0066cc; --accent: #0066cc;
  --text: #111; --sub: #555; --row-hover: #d6eaff; --row-sel: #a8cfff;
  --header: #c8c8c8;
}
body { font-family: 'Monospace', monospace; font-size: 13px; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

/* ===== タブバー ===== */
#tabbar {
  display: flex; background: var(--panel); border-bottom: 2px solid var(--border);
  overflow-x: auto; white-space: nowrap; height: 36px; flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
}
#tabbar::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 0 12px; border: none; border-right: 1px solid var(--border);
  background: var(--panel); cursor: pointer; font-size: 12px; height: 36px;
  display: inline-flex; align-items: center; flex-shrink: 0; color: var(--text);
}
.tab-btn.active { background: var(--bg); font-weight: bold; border-bottom: 2px solid var(--bg); color: var(--accent); }

/* ===== タブコンテンツ共通 ===== */
.tab-content { display: none; flex-direction: column; height: calc(100vh - 36px); overflow: hidden; }
.tab-content.active { display: flex; }

/* ===== シミュレータタブ ===== */
/* 設定パネル（折りたたみ式） */
#settings-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; background: var(--header); border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none; flex-shrink: 0;
}
#settings-toggle span { font-size: 12px; font-weight: bold; }
#toggle-arrow { font-size: 14px; transition: transform 0.2s; }
#toggle-arrow.open { transform: rotate(180deg); }

#settings-panel {
  background: var(--panel); border-bottom: 2px solid var(--border);
  overflow-y: auto; flex-shrink: 0; max-height: 55vh;
  transition: max-height 0.2s ease;
}
#settings-panel.collapsed { max-height: 0; overflow: hidden; }

.section { padding: 6px 8px; border-bottom: 1px solid #ddd; }
.section-title { font-size: 11px; color: var(--sub); margin-bottom: 4px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }

/* スキル一覧 */
#selected-skills { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; min-height: 24px; }
.skill-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: #ddeeff; border: 1px solid #88bbdd; border-radius: 12px;
  padding: 2px 8px 2px 10px; font-size: 12px;
}
.skill-chip .del-x {
  width: 16px; height: 16px; border-radius: 50%; background: #aaa; color: white;
  border: none; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; line-height: 1;
}

/* スキル追加UI */
.skill-add-row { display: flex; gap: 4px; align-items: stretch; }
.skill-add-row select { flex: 1; font-size: 12px; border: 1px solid var(--border); background: white; padding: 4px; border-radius: 3px; }
.add-btn {
  padding: 4px 10px; font-size: 12px; background: var(--accent); color: white;
  border: none; border-radius: 3px; cursor: pointer; white-space: nowrap;
}
.clear-btn {
  padding: 4px 10px; font-size: 12px; background: #aaa; color: white;
  border: none; border-radius: 3px; cursor: pointer;
}

/* オプション行 */
.opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.opt-item { display: flex; align-items: center; gap: 5px; font-size: 12px; }
.opt-item input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
.opt-row2 { display: flex; align-items: center; gap: 8px; font-size: 12px; flex-wrap: wrap; }
.opt-row2 label { white-space: nowrap; }
.opt-row2 select, .opt-row2 input[type=number] {
  font-size: 12px; border: 1px solid var(--border); padding: 3px 5px; border-radius: 3px; background: white;
}
.opt-row2 input[type=number] { width: 60px; }

/* ===== 検索ボタンバー ===== */
#search-bar {
  display: flex; gap: 6px; padding: 6px 8px; background: var(--panel);
  border-bottom: 1px solid var(--border); flex-shrink: 0; align-items: center;
}
#search-btn {
  flex: 1; padding: 8px; font-size: 14px; font-weight: bold;
  background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer;
}
#search-btn:active { opacity: 0.8; }
#abort-btn {
  padding: 8px 14px; font-size: 13px; font-weight: bold;
  background: #cc3300; color: white; border: none; border-radius: 5px; cursor: pointer; display: none;
}
#abort-btn.show { display: block; }
#result-label { font-size: 12px; color: var(--sub); white-space: nowrap; }
#progress-bar-wrap { height: 3px; background: #ddd; flex-shrink: 0; }
#progress-bar { height: 3px; background: var(--accent); width: 0%; transition: width 0.15s; }

/* ===== 結果リスト ===== */
#result-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#result-table { width: 100%; border-collapse: collapse; font-size: 11px; }
#result-table th {
  background: var(--header); border: 1px solid var(--border); padding: 3px 5px;
  white-space: nowrap; position: sticky; top: 0; z-index: 1; font-size: 11px;
}
#result-table td { border: 1px solid #ddd; padding: 3px 5px; white-space: nowrap; cursor: pointer; }
#result-table tr.selected td { background: var(--row-sel); }
#result-table tr:active td { background: var(--row-hover); }

/* ===== 詳細モーダル ===== */
#detail-modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 1000; align-items: flex-end;
}
#detail-modal.show { display: flex; }
#detail-inner {
  background: white; width: 100%; max-height: 75vh; border-radius: 12px 12px 0 0;
  display: flex; flex-direction: column; overflow: hidden;
}
#detail-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--header); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#detail-header span { font-weight: bold; font-size: 13px; }
#detail-close {
  padding: 4px 12px; background: #888; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
}
#detail-body { overflow-y: auto; padding: 10px 14px; flex: 1; }
#detail-text { font-family: monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; }
#detail-actions { display: flex; gap: 8px; padding: 8px 14px; border-top: 1px solid #ddd; flex-shrink: 0; flex-wrap: wrap; }
#detail-actions button {
  flex: 1; padding: 8px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer;
  background: var(--btn); min-width: 80px;
}
#detail-actions .primary { background: var(--accent); color: white; }

/* ===== お守りタブ ===== */
#tab-charm { padding: 0; }
.tab-toolbar {
  display: flex; gap: 6px; padding: 8px; background: var(--panel);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.tab-toolbar button {
  padding: 6px 12px; font-size: 12px; border: 1px solid var(--border);
  background: var(--btn); border-radius: 3px; cursor: pointer;
}
.scroll-table { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { background: var(--header); border: 1px solid var(--border); padding: 4px 6px; position: sticky; top: 0; white-space: nowrap; }
.data-table td { border: 1px solid #ddd; padding: 4px 6px; }
.data-table tr:active td { background: var(--row-hover); }
.data-table button { font-size: 11px; padding: 2px 6px; border: 1px solid var(--border); background: var(--btn); border-radius: 2px; cursor: pointer; }

/* ===== ダイアログ ===== */
.dialog-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
.dialog-overlay.show { display: flex; }
.dialog { background: var(--bg); border-radius: 8px; padding: 14px; width: 90vw; max-width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.dialog h3 { font-size: 14px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.dialog-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; }
.dialog-row label { width: 90px; flex-shrink: 0; }
.dialog-row select, .dialog-row input { flex: 1; font-size: 13px; border: 1px solid var(--border); padding: 5px; border-radius: 3px; }
.dialog-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
.dialog-btns button { padding: 6px 16px; font-size: 13px; border: none; border-radius: 4px; cursor: pointer; background: var(--btn); }
.dialog-btns .primary { background: var(--accent); color: white; }

/* ===== その他タブ ===== */
.simple-tab { padding: 8px; overflow-y: auto; flex: 1; }
.simple-tab h3 { font-size: 12px; margin-bottom: 6px; color: var(--sub); }
.simple-tab button { padding: 6px 14px; font-size: 12px; border: 1px solid var(--border); background: var(--btn); border-radius: 3px; cursor: pointer; margin-bottom: 8px; }

/* ===== ローディング ===== */
#loading { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
#loading .title { font-size: 16px; font-weight: bold; }
#loading .sub { font-size: 12px; color: var(--sub); }

/* スクロールバー */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: #aaa; border-radius: 2px; }
</style>
</head>
<body>

<div id="loading">
  <div class="title">頑シミュ MH4G ver.0.9.6</div>
  <div class="sub">データ読み込み中...</div>
</div>

<!-- タブバー -->
<div id="tabbar">
  <div class="tab-btn active" onclick="showTab('simu')">🔍 検索</div>
  <div class="tab-btn" onclick="showTab('charm')">💎 お守り</div>
  <div class="tab-btn" onclick="showTab('myset')">📁 マイセット</div>
  <div class="tab-btn" onclick="showTab('kotei')">📌 固定</div>
  <div class="tab-btn" onclick="showTab('jyogai')">🚫 除外</div>
  <div class="tab-btn" onclick="showTab('decoex')">🔩 装飾除外</div>
  <div class="tab-btn" onclick="showTab('hakkutu')">⛏ 発掘</div>
</div>

<!-- ===== シミュレータタブ ===== -->
<div id="tab-simu" class="tab-content active">

  <!-- 折りたたみヘッダー -->
  <div id="settings-toggle" onclick="toggleSettings()">
    <span id="settings-label">⚙ 設定（タップで開閉）</span>
    <span id="toggle-arrow" class="open">▲</span>
  </div>

  <!-- 設定パネル -->
  <div id="settings-panel">

    <!-- スキル選択 -->
    <div class="section">
      <div class="section-title">選択スキル</div>
      <div id="selected-skills"></div>
      <div class="skill-add-row">
        <select id="cat-select" onchange="onCatChange()" style="max-width:100px;"></select>
        <select id="skill-select" size="1"></select>
        <button class="add-btn" onclick="addSelectedSkill()">追加</button>
        <button class="clear-btn" onclick="clearAllSkills()">全消</button>
      </div>
    </div>

    <!-- 武器・タイプ -->
    <div class="section">
      <div class="opt-row2">
        <label>武器スロ</label>
        <select id="weapon-slot">
          <option value="-1">自動</option>
          <option value="0">なし</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="-2">装飾品なし</option>
        </select>
        <label>タイプ</label>
        <select id="hunter-type">
          <option value="0">両方</option>
          <option value="1">剣士</option>
          <option value="2">ガンナー</option>
        </select>
        <label>性別</label>
        <select id="hunter-gender">
          <option value="0">両方</option>
          <option value="1">男</option>
          <option value="2">女</option>
        </select>
      </div>
    </div>

    <!-- オプション -->
    <div class="section">
      <div class="opt-grid">
        <label class="opt-item"><input type="checkbox" id="opt-exclude" onchange="saveOpts()"> 固定/除外使用</label>
        <label class="opt-item"><input type="checkbox" id="opt-omamori" checked onchange="saveOpts()"> お守り検索</label>
        <label class="opt-item"><input type="checkbox" id="opt-matome" onchange="saveOpts()"> まとめ検索</label>
        <label class="opt-item"><input type="checkbox" id="opt-hakkutu" onchange="saveOpts()"> 発掘全含む</label>
      </div>
      <div class="opt-row2" style="margin-top:6px;">
        <label>頑張り度</label>
        <input type="number" id="opt-effort" value="20" min="1" max="9999" onchange="saveOpts()">
      </div>
    </div>
  </div>

  <!-- 検索ボタンバー -->
  <div id="search-bar">
    <button id="search-btn" onclick="doSearch()">🔍 検索開始</button>
    <button id="abort-btn" onclick="doAbort()">⏹ 中断</button>
    <span id="result-label">結果 0件</span>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>

  <!-- 結果テーブル -->
  <div id="result-area">
    <table id="result-table">
      <thead>
        <tr>
          <th>#</th><th>頭</th><th>胴</th><th>腕</th><th>腰</th><th>脚</th><th>護石</th><th>防</th>
        </tr>
      </thead>
      <tbody id="result-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ===== お守りタブ ===== -->
<div id="tab-charm" class="tab-content">
  <div class="tab-toolbar">
    <button onclick="openCharmDialog(null)">＋ 追加</button>
    <button onclick="sortCharms()">並替</button>
    <button onclick="clearAllCharms()">全消去</button>
  </div>
  <div class="scroll-table">
    <table class="data-table">
      <thead><tr><th>スロ</th><th>系統１</th><th>値</th><th>系統２</th><th>値</th><th>操作</th></tr></thead>
      <tbody id="charm-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ===== マイセットタブ ===== -->
<div id="tab-myset" class="tab-content">
  <div class="tab-toolbar">
    <button onclick="clearAllMysets()">全て削除</button>
  </div>
  <div class="scroll-table">
    <table class="data-table">
      <thead><tr><th>セット名</th><th>スキル</th><th>操作</th></tr></thead>
      <tbody id="myset-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ===== 固定装備タブ ===== -->
<div id="tab-kotei" class="tab-content">
  <div class="tab-toolbar"><button onclick="clearFixed()">全クリア</button></div>
  <div class="scroll-table">
    <table class="data-table">
      <thead><tr><th>部位</th><th>固定装備</th><th>操作</th></tr></thead>
      <tbody id="fixed-tbody">
        <tr><td>頭</td><td id="fixed-head-name">（なし）</td><td><button onclick="clearFixed('head')">クリア</button></td></tr>
        <tr><td>胴</td><td id="fixed-body-name">（なし）</td><td><button onclick="clearFixed('body')">クリア</button></td></tr>
        <tr><td>腕</td><td id="fixed-arm-name">（なし）</td><td><button onclick="clearFixed('arm')">クリア</button></td></tr>
        <tr><td>腰</td><td id="fixed-wst-name">（なし）</td><td><button onclick="clearFixed('wst')">クリア</button></td></tr>
        <tr><td>脚</td><td id="fixed-leg-name">（なし）</td><td><button onclick="clearFixed('leg')">クリア</button></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ===== 除外装備タブ ===== -->
<div id="tab-jyogai" class="tab-content">
  <div class="tab-toolbar"><button onclick="clearAllExclude()">全クリア</button></div>
  <div class="scroll-table">
    <table class="data-table">
      <thead><tr><th>部位</th><th>装備名</th><th>操作</th></tr></thead>
      <tbody id="jyogai-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ===== 装飾品除外タブ ===== -->
<div id="tab-decoex" class="tab-content">
  <div class="tab-toolbar"><button onclick="clearDecoExclude()">全クリア</button></div>
  <div class="scroll-table">
    <table class="data-table">
      <thead><tr><th>装飾品名</th><th>操作</th></tr></thead>
      <tbody id="decoex-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ===== 発掘タブ ===== -->
<div id="tab-hakkutu" class="tab-content">
  <div class="simple-tab">
    <p style="font-size:12px;color:var(--sub);margin-bottom:8px;">「発掘を全て含む」チェックで全発掘装備を検索対象にします。</p>
    <div id="hakkutu-list"></div>
  </div>
</div>

<!-- ===== 詳細モーダル ===== -->
<div id="detail-modal" onclick="closeDetail(event)">
  <div id="detail-inner">
    <div id="detail-header">
      <span>装備詳細</span>
      <button id="detail-close" onclick="closeDetailModal()">閉じる</button>
    </div>
    <div id="detail-body">
      <pre id="detail-text"></pre>
    </div>
    <div id="detail-actions">
      <button class="primary" onclick="detailAddMyset()">📁 マイセット追加</button>
      <button onclick="detailCopy()">📋 コピー</button>
      <button onclick="detailFixHead()">📌 頭を固定</button>
      <button onclick="detailExclHead()">🚫 頭を除外</button>
    </div>
  </div>
</div>

<!-- ===== お守りダイアログ ===== -->
<div id="charm-dialog" class="dialog-overlay">
  <div class="dialog">
    <h3>お守り登録・編集</h3>
    <div class="dialog-row"><label>スキル系統１</label><select id="cd-kei1"><option value="">（なし）</option></select></div>
    <div class="dialog-row"><label>値１</label><input type="number" id="cd-val1" value="0" min="-15" max="20"></div>
    <div class="dialog-row"><label>スキル系統２</label><select id="cd-kei2"><option value="">（なし）</option></select></div>
    <div class="dialog-row"><label>値２</label><input type="number" id="cd-val2" value="0" min="-15" max="20"></div>
    <div class="dialog-row"><label>スロット</label>
      <select id="cd-slot"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
    </div>
    <div class="dialog-btns">
      <button class="primary" onclick="saveCharm()">登録</button>
      <button onclick="closeCharmDialog()">キャンセル</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="search.js"></script>
<script src="app.js"></script>
</body>
</html>
